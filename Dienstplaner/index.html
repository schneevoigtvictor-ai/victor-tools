<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienstplaner · SBK Hilfsmittel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --c-brand:#003C6E;--c-brand-dark:#002B52;--c-brand-light:#BAF6FF;--c-brand-mid:#2B6CB0;
  --c-bg:#F0F4F8;--c-surface:#FFFFFF;--c-border:#E2E8F0;--c-border-mid:#CBD5E0;
  --c-text:#1A202C;--c-text-mid:#4A5568;--c-text-soft:#718096;--c-text-faint:#A0AEC0;
  --c-warn-bg:#FFFBEB;--c-warn:#7B341E;--c-warn-border:#F6E05E;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--r-full:9999px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--c-bg);font-family:'DM Sans',sans-serif;color:var(--c-text);font-size:15px;line-height:1.65}
.topbar{height:60px;background:var(--c-brand-dark);color:#fff;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.topbar .bl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
.topbar .tn{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700}
.tabs{display:flex;gap:2px;background:var(--c-surface);border-bottom:2px solid var(--c-border);padding:0 24px;overflow-x:auto}
.tab{padding:10px 18px;font-family:inherit;font-size:13px;font-weight:700;color:var(--c-text-soft);background:0;border:0;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--c-text-mid)}.tab.on{color:var(--c-brand);border-bottom-color:var(--c-brand)}
.btn{font-family:inherit;font-size:13px;font-weight:700;border-radius:var(--r-md);padding:9px 20px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;border:1.5px solid transparent}
.btn-p{background:var(--c-brand);color:#fff;border-color:var(--c-brand)}.btn-p:hover{background:var(--c-brand-dark)}
.btn-s{background:#fff;color:var(--c-brand);border-color:var(--c-brand)}.btn-s:hover{background:var(--c-brand);color:#fff}
.btn-g{background:0;color:var(--c-text-mid);border-color:var(--c-border-mid)}.btn-g:hover{border-color:var(--c-text-mid)}
.btn-ok{background:#16A34A;color:#fff;border-color:#16A34A}.btn-ok:hover{background:#15803D}
.btn-d{background:0;color:#C53030;border-color:#FC8181}.btn-d:hover{background:#FFF5F5}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r-sm)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--c-border);background:#FAFBFC;gap:8px;flex-wrap:wrap}
.card-h h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-text-mid);display:flex;align-items:center;gap:8px}
.card-b{padding:20px}
.tbl{width:100%;border-collapse:collapse;font-size:13px;border:2px solid var(--c-brand-dark)}
.tbl th{background:var(--c-brand-dark);color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;border:1px solid rgba(255,255,255,.2);text-align:left;white-space:nowrap}
.tbl td{padding:10px 12px;border:1px solid var(--c-border-mid);vertical-align:top;line-height:1.5}
.tbl tr:nth-child(even) td{background:#EDF2F7}
.tbl tbody tr:hover td{background:#E2E8F0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:24px}
.modal{background:#fff;border-radius:var(--r-xl);padding:28px 32px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal h3{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:16px}
.modal label{display:block;font-size:13px;font-weight:700;color:var(--c-text-mid);margin-bottom:4px;margin-top:14px}
.modal label:first-of-type{margin-top:0}
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--c-border);border-radius:var(--r-md);font-family:inherit;font-size:14px;color:var(--c-text);outline:0;transition:.15s}
.inp:focus{border-color:var(--c-brand-mid);box-shadow:0 0 0 3px rgba(43,108,176,.1)}
select.inp{appearance:auto;cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:var(--c-brand-dark);color:#fff;border-radius:var(--r-md);padding:11px 18px;font-size:13px;font-weight:500;box-shadow:0 10px 25px rgba(0,0,0,.12);transform:translateY(44px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:600}
.toast.on{transform:translateY(0);opacity:1}.toast.ok{background:#16A34A}.toast.warn{background:#C05621}.toast.err{background:#C53030}
.info-btn{width:20px;height:20px;border-radius:50%;background:#EBF8FF;color:var(--c-brand-mid);border:1px solid #BEE3F8;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-family:inherit}
.info-btn:hover{background:var(--c-brand-mid);color:#fff}
.info-pop{position:absolute;z-index:300;background:#fff;border:1px solid var(--c-border);border-radius:var(--r-lg);padding:16px 20px;box-shadow:0 8px 24px rgba(0,0,0,.1);max-width:340px;font-size:13px;color:var(--c-text-mid);line-height:1.6}
.info-pop strong{color:var(--c-text)}
.info-pop .ex{background:#F7FAFC;border:1px solid var(--c-border);border-radius:var(--r-sm);padding:8px 12px;margin-top:8px;font-size:12px}
.nav{background:var(--c-surface);border-bottom:1px solid var(--c-border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nav-btn{background:0;border:1.5px solid var(--c-border);color:var(--c-text-mid);padding:4px 12px;cursor:pointer;border-radius:var(--r-sm);font-size:18px;font-family:inherit;line-height:1;transition:.15s}
.nav-btn:hover{border-color:var(--c-brand-mid);color:var(--c-brand)}
.nav-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;min-width:180px;text-align:center}
.sl{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--r-sm);font-size:11px;font-weight:700;border:1px solid}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.dot-sm{width:6px;height:6px;border-radius:2px;display:inline-block;flex-shrink:0}
.cell{cursor:pointer;padding:3px 10px;border-radius:var(--r-sm);display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:500;transition:.15s;min-width:70px;border:1px solid transparent}
.cell:hover{border-color:var(--c-brand-mid)}.cell.empty{color:var(--c-text-faint);border:1px dashed var(--c-border)}
.cell-sel{padding:4px 8px;border:1.5px solid var(--c-brand-mid);border-radius:var(--r-sm);font-family:inherit;font-size:13px;color:var(--c-text);background:var(--c-surface);outline:0;box-shadow:0 0 0 3px rgba(43,108,176,.1)}
.bar-t{height:6px;background:var(--c-border);border-radius:var(--r-full);overflow:hidden}
.bar-f{height:100%;border-radius:var(--r-full);transition:width .3s}
.abs-d{width:100%;height:30px;border-radius:var(--r-sm);border:1.5px solid var(--c-border);cursor:pointer;background:var(--c-surface);color:var(--c-text-mid);font-size:11px;font-family:inherit;font-weight:500;display:flex;align-items:center;justify-content:center;transition:.15s;position:relative}
.abs-d:hover{border-color:var(--c-brand-mid)}
.abs-d.hol{background:var(--c-warn-bg);border-color:var(--c-warn-border);color:var(--c-warn);cursor:default}
.abs-d.abs-urlaub{background:#EDE9FE;border-color:#C4B5FD;color:#553C9A;font-weight:700}
.abs-d.abs-gleit{background:#E6FFFA;border-color:#81E6D9;color:#234E52;font-weight:700}
.abs-d.abs-krank{background:#FFF5F5;border-color:#FC8181;color:#742A2A;font-weight:700}
.abs-d.abs-kindkrank{background:#FFF5F5;border-color:#FEB2B2;color:#9B2C2C;font-weight:700}
.abs-d.abs-seminar{background:#EBF8FF;border-color:#90CDF4;color:#2A4365;font-weight:700}
.abs-d.abs-sonstige{background:#F7FAFC;border-color:#CBD5E0;color:#4A5568;font-weight:700}
.warn-box{background:var(--c-warn-bg);border:1px solid var(--c-warn-border);border-radius:var(--r-md);padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.warn-box .wt{font-size:13px;color:var(--c-warn);line-height:1.5}
.toggle{position:relative;width:40px;height:22px;background:var(--c-border-mid);border-radius:11px;cursor:pointer;transition:.2s;border:0;flex-shrink:0}
.toggle.on{background:#16A34A}
.toggle::after{content:'';position:absolute;left:2px;top:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:20px}
.sc-blue{background:#EBF8FF;border-color:#90CDF4;color:#2A4365}
.sc-green{background:#F0FFF4;border-color:#9AE6B4;color:#22543D}
.sc-orange{background:#FFFBEB;border-color:#F6E05E;color:#7B341E}
.sc-purple{background:#F3F0FF;border-color:#C4B5FD;color:#553C9A}
.sc-red{background:#FFF5F5;border-color:#FC8181;color:#742A2A}
.sc-teal{background:#E6FFFA;border-color:#81E6D9;color:#234E52}
.vac-grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:2px;font-size:12px}
.vac-hdr{font-weight:700;color:var(--c-text-soft);text-align:center;padding:4px 0;font-size:11px;text-transform:uppercase}
.vac-kw{font-weight:700;color:var(--c-text-faint);font-size:10px;display:flex;align-items:center;justify-content:center}
.day-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.day-chip.pref{background:#F0FFF4;color:#22543D}.day-chip.ok{background:#F7FAFC;color:var(--c-text-mid)}.day-chip.no{background:#FFF5F5;color:#C53030;text-decoration:line-through}
.abs-picker{position:fixed;z-index:600;background:#fff;border:1px solid var(--c-border);border-radius:var(--r-md);box-shadow:0 8px 24px rgba(0,0,0,.18);padding:4px;min-width:150px}
.abs-picker button{display:block;width:100%;text-align:left;padding:6px 10px;border:0;background:0;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;border-radius:4px;transition:.1s}
.abs-picker button:hover{background:var(--c-bg)}
.abs-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.abs-legend span{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid}
.copy-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--c-border-mid);border-radius:var(--r-sm);background:#fff;font-size:12px;font-weight:700;color:var(--c-text-mid);cursor:pointer;transition:all .15s;font-family:inherit}
.copy-btn:hover{border-color:var(--c-brand-mid);color:var(--c-brand);background:#F7FAFC}
.copy-btn.copied{border-color:#16A34A;color:#16A34A;background:#F0FFF4}
.copy-btn svg{flex-shrink:0}
.sr-toggle{display:inline-flex;border:1.5px solid var(--c-border);border-radius:var(--r-md);overflow:hidden}
.sr-toggle button{padding:6px 14px;font-family:inherit;font-size:12px;font-weight:700;border:0;background:#fff;color:var(--c-text-mid);cursor:pointer;transition:.15s;border-right:1px solid var(--c-border)}
.sr-toggle button:last-child{border-right:0}
.sr-toggle button:hover{background:var(--c-bg)}
.sr-toggle button.on{background:var(--c-brand);color:#fff}
.hm-wrap{overflow-x:auto;margin-bottom:20px}
.hm-tbl{border-collapse:collapse;font-size:11px;width:100%;border:2px solid var(--c-brand-dark)}
.hm-tbl th{background:var(--c-brand-dark);color:#fff;padding:6px 4px;text-align:center;font-weight:700;font-size:10px;border:1px solid rgba(255,255,255,.2);white-space:nowrap;position:sticky;top:0}
.hm-tbl th.hm-name{text-align:left;padding-left:10px;min-width:100px;position:sticky;left:0;z-index:2}
.hm-tbl td{padding:4px 2px;text-align:center;border:1px solid var(--c-border-mid);min-width:32px;height:28px;font-size:10px;font-weight:700}
.hm-tbl td.hm-name{text-align:left;padding-left:10px;font-weight:700;font-size:12px;white-space:nowrap;background:#fff;position:sticky;left:0;z-index:1;border-right:2px solid var(--c-border-mid)}
.hm-tbl tr:nth-child(even) td{background:#FAFBFC}
.hm-tbl tr:nth-child(even) td.hm-name{background:#FAFBFC}
.hm-c-empty{}.hm-c-hol{background:#FFFBEB!important;color:#C05621}
.hm-c-abs{background:#FFF5F5!important;color:#C53030}
@media print{.no-print{display:none!important}body{background:#fff}.topbar{position:static}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect,useRef=React.useRef;
var MN=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
var DOW=["So","Mo","Di","Mi","Do","Fr","Sa"];
var COLORS=[{id:"blue",label:"Blau",cls:"sc-blue",bgHex:"#EBF8FF",textHex:"#2A4365"},{id:"green",label:"Grün",cls:"sc-green",bgHex:"#F0FFF4",textHex:"#22543D"},{id:"orange",label:"Orange",cls:"sc-orange",bgHex:"#FFFBEB",textHex:"#7B341E"},{id:"purple",label:"Lila",cls:"sc-purple",bgHex:"#F3F0FF",textHex:"#553C9A"},{id:"red",label:"Rot",cls:"sc-red",bgHex:"#FFF5F5",textHex:"#742A2A"},{id:"teal",label:"Türkis",cls:"sc-teal",bgHex:"#E6FFFA",textHex:"#234E52"}];
var STORE_KEY="sbk_dienstplaner_v3";
var DE_STATES=[{code:"BW",label:"Baden-Württemberg"},{code:"BY",label:"Bayern"},{code:"BE",label:"Berlin"},{code:"BB",label:"Brandenburg"},{code:"HB",label:"Bremen"},{code:"HH",label:"Hamburg"},{code:"HE",label:"Hessen"},{code:"MV",label:"Mecklenburg-Vorp."},{code:"NI",label:"Niedersachsen"},{code:"NW",label:"Nordrhein-Westfalen"},{code:"RP",label:"Rheinland-Pfalz"},{code:"SL",label:"Saarland"},{code:"SN",label:"Sachsen"},{code:"ST",label:"Sachsen-Anhalt"},{code:"SH",label:"Schleswig-Holstein"},{code:"TH",label:"Thüringen"}];
var STATE_COL={SN:"#3868C6",BY:"#C05621",BW:"#16A34A",BE:"#A584FF",BB:"#718096",HB:"#2B6CB0",HH:"#C53030",HE:"#DD6B20",MV:"#38A169",NI:"#805AD5",NW:"#D69E2E",RP:"#E53E3E",SL:"#319795",ST:"#667EEA",SH:"#00B5D8",TH:"#9F7AEA"};

// Abwesenheitstypen
var ABS_TYPES=[
  {id:"urlaub",label:"Urlaub",emoji:"🌴",cls:"abs-urlaub",color:"#553C9A"},
  {id:"gleit",label:"Gleittag",emoji:"⏰",cls:"abs-gleit",color:"#234E52"},
  {id:"krank",label:"Krank",emoji:"🤒",cls:"abs-krank",color:"#742A2A"},
  {id:"kindkrank",label:"Kindkrank",emoji:"👶",cls:"abs-kindkrank",color:"#9B2C2C"},
  {id:"seminar",label:"Seminar",emoji:"📚",cls:"abs-seminar",color:"#2A4365"},
  {id:"sonstige",label:"Sonstige",emoji:"📌",cls:"abs-sonstige",color:"#4A5568"}
];
function absInfo(typeId){return ABS_TYPES.find(function(a){return a.id===typeId})||ABS_TYPES[0]}
// Check if member is absent on date (any type)
function isAbsent(absences,memberId,dk){var ma=absences[memberId];if(!ma)return null;return ma[dk]||null}

var RULE_TYPES=[
  {id:"no_consecutive",label:"Keine Folgetage",desc:"Nie zwei Dienste an aufeinanderfolgenden Tagen",hasValue:false},
  {id:"different_per_day",label:"Verschiedene Personen pro Tag",desc:"Verschiedene Slots am selben Tag = verschiedene Personen",hasValue:false},
  {id:"max_per_week",label:"Max. Dienste pro Woche",desc:"Maximale Anzahl Dienste pro Person pro Woche",hasValue:true,defaultVal:3},
  {id:"min_rest_days",label:"Min. Ruhetage pro Woche",desc:"Mindestanzahl freie Tage pro Woche",hasValue:true,defaultVal:2},
  {id:"max_consecutive_days",label:"Max. aufeinanderfolgende Tage",desc:"Max. Tage in Folge mit Dienst",hasValue:true,defaultVal:5}
];
var DAY_STATUSES=[
  {id:"available",label:"Verfügbar",emoji:"✅",color:"var(--c-text-mid)"},
  {id:"preferred",label:"Bevorzugt",emoji:"⭐",color:"#16A34A"},
  {id:"if_needed",label:"Nur im Notfall",emoji:"⚠️",color:"#C05621"},
  {id:"unavailable",label:"Nicht verfügbar",emoji:"🚫",color:"#C53030"}
];
var SHIFT_PREFS=[
  {id:"neutral",label:"Neutral",emoji:"➖",color:"var(--c-text-mid)"},
  {id:"preferred",label:"Bevorzugt",emoji:"⭐",color:"#16A34A"},
  {id:"avoid",label:"Ungern",emoji:"⚠️",color:"#C05621"}
];
function getShiftPref(member,shiftId){var sp=(member.shiftPrefs||[]).find(function(x){return x.shiftId===shiftId});return sp?sp.status:"neutral"}

function uid(){return Math.random().toString(36).slice(2,9)}
var escH=function(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};
async function copyRich(plain,html){try{var hb=new Blob([html],{type:'text/html'});var tb=new Blob([plain],{type:'text/plain'});await navigator.clipboard.write([new ClipboardItem({'text/html':hb,'text/plain':tb})]);return true}catch(e){console.warn('Rich-Copy fallback:',e);await navigator.clipboard.writeText(plain);return true}}
function setCopyFeedback(btn){var orig=btn.innerHTML;btn.classList.add('copied');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>Kopiert';setTimeout(function(){btn.classList.remove('copied');btn.innerHTML=orig},2000)}
var COPY_ICON='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
function fk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function getKW(d){var u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);var y0=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y0)/864e5)+1)/7)}
function daysInMonth(y,m){var d=[];var x=new Date(y,m,1);while(x.getMonth()===m){d.push(new Date(x));x.setDate(x.getDate()+1)}return d}
function getEaster(y){var a=y%19,b=Math.floor(y/100),c=y%100,dd=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),hh=(19*a+b-dd-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-hh-k)%7,mm=Math.floor((a+11*hh+22*l)/451),mo=Math.floor((hh+l-7*mm+114)/31),dy=((hh+l-7*mm+114)%31)+1;return new Date(y,mo-1,dy)}
function getBBT(y){var d=new Date(y,10,22);while(d.getDay()!==3)d.setDate(d.getDate()-1);return d}
function colorCls(cid){var f=COLORS.find(function(c){return c.id===cid});return f?f.cls:"sc-blue"}
function findMem(members,id){return members.find(function(m){return m.id===id})||null}
function findSt(code){var f=DE_STATES.find(function(s){return s.code===code});return f?f.label:code}
function getDayStatus(member,dayNum){if(!member.dayPrefs)return"available";var p=member.dayPrefs.find(function(x){return x.day===dayNum});return p?p.status:"available"}

function shiftActiveOnDate(shift,date){
  var dow=date.getDay();var kw=getKW(date);var rhythm=shift.rhythm||"every";
  if(rhythm==="every"){return(shift.days||[]).indexOf(dow)>=0}
  if(rhythm==="even_odd"){var isEven=kw%2===0;return isEven?(shift.daysEven||[]).indexOf(dow)>=0:(shift.daysOdd||[]).indexOf(dow)>=0}

function buildConfTable(headers,rows){

function App(){
  var now=new Date();
  var _c=useState(DEFAULT_CFG),cfg=_c[0],setCfg=_c[1];
  var _p=useState({}),plans=_p[0],setPlans=_p[1];
  var _v=useState({}),absences=_v[0],setAbsences=_v[1];
  var _t=useState("plan"),tab=_t[0],setTab=_t[1];
  var _vy=useState(now.getFullYear()),vy=_vy[0],setVy=_vy[1];
  var _vm=useState(now.getMonth()),vm=_vm[0],setVm=_vm[1];
  var _ec=useState(null),editCell=_ec[0],setEditCell=_ec[1];
  var _mo=useState(null),modal=_mo[0],setModal=_mo[1];
  var _tm=useState(""),toastMsg=_tm[0],setToastMsg=_tm[1];
  var _tt=useState(""),toastType=_tt[0],setToastType=_tt[1];
  var _sr=useState("month"),statsRange=_sr[0],setStatsRange=_sr[1];

  useEffect(function(){try{var r=localStorage.getItem(STORE_KEY);if(r){var d=JSON.parse(r);if(d.cfg){var mg={};for(var k in DEFAULT_CFG)mg[k]=DEFAULT_CFG[k];for(var k2 in d.cfg)mg[k2]=d.cfg[k2];if(!Array.isArray(mg.shiftRules))mg.shiftRules=DEFAULT_CFG.shiftRules;setCfg(mg)}if(d.plans)setPlans(d.plans);var rawVac=d.vacations||d.absences||{};setAbsences(migrateVac(rawVac))}}catch(e){}},[]);

  function save(c,p,v){try{localStorage.setItem(STORE_KEY,JSON.stringify({cfg:c,plans:p,absences:v}));toast("Gespeichert","ok")}catch(e){toast("Fehler","err")}}
  function toast(m,t){setToastMsg(m);setToastType(t||"ok");setTimeout(function(){setToastMsg("");setToastType("")},2800)}
  function cloneCfg(ov){var nc={};for(var k in cfg)nc[k]=cfg[k];for(var k2 in ov)nc[k2]=ov[k2];setCfg(nc);return nc}

  var holidays=useMemo(function(){return buildHol(vy)},[vy]);
  var days=useMemo(function(){return daysInMonth(vy,vm)},[vy,vm]);
  var mk=vy+"-"+vm;var curPlan=plans[mk]||{};
  function navM(dir){var m=vm+dir,y=vy;if(m<0){m=11;y--}if(m>11){m=0;y++}setVm(m);setVy(y)}
  function ruleEnabled(rType){return(cfg.shiftRules||[]).some(function(r){return r.type===rType&&r.enabled})}

  function checkVV(abs,date){var dk=fk(date),violations=[];var onAbs=cfg.members.filter(function(m){return isAbsent(abs,m.id,dk)});cfg.vacRules.filter(function(r){return r.enabled}).forEach(function(r){if(r.type==="max_concurrent"&&onAbs.length>r.value)violations.push("Max. "+r.value+" gleichzeitig – aktuell "+onAbs.length);if(r.type==="exclusion"&&r.memberIds){var excl=r.memberIds.filter(function(id){return onAbs.some(function(m){return m.id===id})});if(excl.length>1)violations.push("Ausschluss: "+excl.map(function(id){var m2=findMem(cfg.members,id);return m2?m2.name:"?"}).join(" & "))}if(r.type==="min_present"){var present=cfg.members.length-onAbs.length;if(present<r.value)violations.push("Min. "+r.value+" anwesend – nur "+present)}});return violations}
  var mvv=useMemo(function(){var vs=[];days.forEach(function(d){if(d.getDay()===0||d.getDay()===6)return;var v=checkVV(absences,d);if(v.length)vs.push({date:d,dk:fk(d),violations:v})});return vs},[days,absences,cfg.members,cfg.vacRules]);

  function autoGen(){
    if(!cfg.members.length){toast("Erst Mitarbeiter anlegen","warn");return}
    var plan={},counts={};
    cfg.members.forEach(function(m){var ps={};cfg.shifts.forEach(function(s){ps[s.id]=0});counts[m.id]={perShift:ps,totalMain:0,backup:0}});
    Object.keys(plans).forEach(function(k){if(k===mk)return;var mp=plans[k];Object.keys(mp).forEach(function(dk2){var dp2=mp[dk2];Object.keys(dp2).forEach(function(slot){var mid2=dp2[slot];if(counts[mid2]){if(slot==="backup")counts[mid2].backup++;else{counts[mid2].totalMain++;if(counts[mid2].perShift[slot]!==undefined)counts[mid2].perShift[slot]++}}})})});
    days.forEach(function(date){
      var dow=date.getDay();if(dow===0||dow===6)return;var dk=fk(date);plan[dk]={};var assigned=[];
      cfg.shifts.filter(function(s){return shiftActiveOnDate(s,date)}).forEach(function(shift){
        var avail=cfg.members.filter(function(m){
          if(assigned.indexOf(m.id)>=0)return false;
          if(isAbsent(absences,m.id,dk))return false;
          if(isHolFor(holidays,dk,m.state))return false;
          if(getDayStatus(m,dow)==="unavailable")return false;
          if(ruleEnabled("no_consecutive")){var prev=addD(date,-1);var pp=plan[fk(prev)];if(pp){var vals=Object.keys(pp).map(function(k3){return pp[k3]});if(vals.indexOf(m.id)>=0)return false}}
          return true;
        }).map(function(m){var w=shift.distribution==="equal"?1:(m.hours||cfg.fullTimeHours)/cfg.fullTimeHours;var shiftCount=counts[m.id].perShift[shift.id]||0;var score=shiftCount/w+counts[m.id].totalMain*0.01;var ds=getDayStatus(m,dow);if(ds==="preferred")score-=0.5;if(ds==="if_needed")score+=2;var sp=getShiftPref(m,shift.id);if(sp==="preferred")score-=1;if(sp==="avoid")score+=3;return{id:m.id,score:score}}).sort(function(a,b){return a.score-b.score});
        if(avail.length){plan[dk][shift.id]=avail[0].id;assigned.push(avail[0].id);counts[avail[0].id].perShift[shift.id]++;counts[avail[0].id].totalMain++}
      });
      if(cfg.needsBackup){var ba=cfg.members.filter(function(m){if(assigned.indexOf(m.id)>=0)return false;if(isAbsent(absences,m.id,dk))return false;if(isHolFor(holidays,dk,m.state))return false;if(getDayStatus(m,dow)==="unavailable")return false;return true}).map(function(m){return{id:m.id,score:counts[m.id].backup/((m.hours||cfg.fullTimeHours)/cfg.fullTimeHours)}}).sort(function(a,b){return a.score-b.score});if(ba.length){plan[dk].backup=ba[0].id;counts[ba[0].id].backup++}}
    });
    var up={};for(var kk in plans)up[kk]=plans[kk];up[mk]=plan;setPlans(up);save(cfg,up,absences);
  }

  <div className="card" style={{marginBottom:16}}><div className="card-h"><h4>⏰ Vollzeit-Basis</h4></div><div className="card-b"><div style={{display:"flex",alignItems:"center",gap:12}}><input className="inp" type="number" style={{width:100}} value={cfg.fullTimeHours} onChange={function(e){cloneCfg({fullTimeHours:Number(e.target.value)})}} onBlur={function(){save(cfg,plans,absences)}} min={1} max={50}/><span style={{fontSize:14,color:"var(--c-text-mid)"}}>Stunden/Woche = 100%</span></div></div></div>

{tab==="stats"&&<div>

    <div className="card" style={{marginBottom:20}}><div style={{overflowX:"auto"}}><table className="tbl"><thead><tr><th>Mitarbeiter</th><th>Std.</th>{cfg.shifts.map(function(sh){return <th key={sh.id} style={{textAlign:"center"}}><span className={"sl "+colorCls(sh.color)}>{sh.label}</span></th>})}{cfg.needsBackup&&<th style={{textAlign:"center"}}>{cfg.backupLabel}</th>}<th style={{textAlign:"center"}}>Ges.</th>{ABS_TYPES.map(function(at){return <th key={at.id} style={{textAlign:"center"}}>{at.emoji}</th>})}</tr></thead>
      <tbody>{cfg.members.map(function(m){var s=stats[m.id]||{perShift:{},backup:0,total:0,abs:{}};return <tr key={m.id}><td style={{fontWeight:700}}>{m.name}</td><td>{m.hours+"h"}</td>{cfg.shifts.map(function(sh){var sv=(s.perShift||{})[sh.id]||0;return <td key={sh.id} style={{textAlign:"center",fontWeight:700,color:sv?"var(--c-brand)":"var(--c-text-faint)"}}>{sv||"–"}</td>})}{cfg.needsBackup&&<td style={{textAlign:"center",fontWeight:700,color:"#553C9A"}}>{s.backup}</td>}<td style={{textAlign:"center",fontWeight:700}}>{s.total}</td>{ABS_TYPES.map(function(at){var v=(s.abs||{})[at.id]||0;return <td key={at.id} style={{textAlign:"center",color:v?at.color:"var(--c-text-faint)"}}>{v||"–"}</td>})}</tr>})}</tbody></table></div></div>

    {function(){
      /* Heatmap */

        var md=daysInMonth(vy,vm);md.forEach(function(d){if(d.getDay()===0||d.getDay()===6)return;hmCols.push({key:fk(d),label:String(d.getDate()).padStart(2,"0"),sub:DOW[d.getDay()],kw:getKW(d)})});
        cfg.members.forEach(function(m){hmData[m.id]={};hmCols.forEach(function(col){
          var dk=col.key;var moPlan=plans[vy+"-"+vm]||{};var dp=moPlan[dk]||{};
          var cell={type:"empty",label:"",bg:"",color:""};
          var hol=isHolFor(holidays,dk,m.state);
          if(hol){cell={type:"hol",label:"🏖",bg:"#FFFBEB",color:"#C05621"}}
          else if(isAbsent(absences,m.id,dk)){var ai=absInfo(isAbsent(absences,m.id,dk));cell={type:"abs",label:ai.emoji,bg:"#FFF5F5",color:ai.color}}
          else{
            var foundShift=null;cfg.shifts.forEach(function(sh){if(dp[sh.id]===m.id)foundShift=sh});
            if(dp.backup===m.id){cell={type:"backup",label:"BU",bg:"#E9D5FF",color:"#553C9A"}}
            else if(foundShift){var cObj2=COLORS.find(function(c){return c.id===foundShift.color});
              var hmBg={blue:"#BEE3F8",green:"#C6F6D5",orange:"#FEFCBF",purple:"#E9D5FF",red:"#FED7D7",teal:"#B2F5EA"};
              cell={type:"shift",label:foundShift.label.substring(0,5),bg:cObj2?hmBg[cObj2.id]||"#BEE3F8":"#BEE3F8",color:cObj2?cObj2.textHex||"#2A4365":"#2A4365"}}
          }
          hmData[m.id][dk]=cell;
        })});
      } else {
        statsMonths.forEach(function(mo){hmCols.push({key:String(mo),label:MN[mo].substring(0,3),sub:""})});
        cfg.members.forEach(function(m){hmData[m.id]={};statsMonths.forEach(function(mo){
          var moKey=vy+"-"+mo;var moPlan=plans[moKey]||{};var cnt=0;
          Object.keys(moPlan).forEach(function(dk2){var dp2=moPlan[dk2];Object.keys(dp2).forEach(function(slot){if(dp2[slot]===m.id)cnt++})});
          hmData[m.id][String(mo)]={count:cnt};
        })});
      }

      if(hmCols.length===0)return null;

      if(statsRange==="month"){
        var prevKw=null;
        return <div className="card" style={{marginBottom:20}}>
          <div className="card-h"><h4>🗓 Heatmap – {statsLabel}</h4></div>
          <div className="hm-wrap"><table className="hm-tbl"><thead><tr><th className="hm-name">Name</th>{hmCols.map(function(c){var showKw=c.kw!==prevKw;prevKw=c.kw;return <th key={c.key} style={{minWidth:36}}><div>{showKw?<span style={{fontSize:8,opacity:.7}}>{"KW"+c.kw}</span>:""}</div><div>{c.sub}</div><div>{c.label}</div></th>})}</tr></thead>
          <tbody>{cfg.members.map(function(m){return <tr key={m.id}><td className="hm-name">{m.name}</td>{hmCols.map(function(c){var cell=hmData[m.id][c.key]||{type:"empty"};return <td key={c.key} style={{background:cell.bg||"transparent",color:cell.color||"var(--c-text-faint)",fontSize:10,fontWeight:cell.type!=="empty"?700:400}} title={cell.type==="shift"?cell.label:cell.type==="backup"?"Backup":cell.type==="abs"?"Abwesend":cell.type==="hol"?"Feiertag":""}>{cell.type==="empty"?"":cell.label}</td>})}</tr>})}</tbody></table></div>
          <div style={{padding:"10px 16px",display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:"var(--c-text-mid)",borderTop:"1px solid var(--c-border)"}}>
            {cfg.shifts.map(function(sh){var cObj3=COLORS.find(function(c){return c.id===sh.color});var hmBg2={blue:"#BEE3F8",green:"#C6F6D5",orange:"#FEFCBF",purple:"#E9D5FF",red:"#FED7D7",teal:"#B2F5EA"};return <span key={sh.id} style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,borderRadius:3,background:cObj3?hmBg2[cObj3.id]||"#BEE3F8":"#BEE3F8",border:"1px solid "+((cObj3?cObj3.textHex:"#2A4365")+"40"),display:"inline-block"}}/>{sh.name}</span>})}
            {cfg.needsBackup&&<span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,borderRadius:3,background:"#E9D5FF",border:"1px solid #553C9A40",display:"inline-block"}}/>{cfg.backupLabel}</span>}
            <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:14,height:14,borderRadius:3,background:"#FFFBEB",border:"1px solid #C0562140",display:"inline-block"}}/>Feiertag</span>

          </div>
        </div>;
      } else {
        var maxCnt=1;cfg.members.forEach(function(m){statsMonths.forEach(function(mo){var c2=(hmData[m.id][String(mo)]||{}).count||0;if(c2>maxCnt)maxCnt=c2})});

          <div className="card-h"><h4>🗓 Heatmap – {statsLabel}</h4></div>
          <div className="hm-wrap"><table className="hm-tbl"><thead><tr><th className="hm-name">Name</th>{hmCols.map(function(c){return <th key={c.key} style={{minWidth:60}}>{c.label}</th>})}<th>Σ</th></tr></thead>
          <tbody>{cfg.members.map(function(m){var rowTotal=0;return <tr key={m.id}><td className="hm-name">{m.name}</td>{hmCols.map(function(c){var cnt=(hmData[m.id][c.key]||{}).count||0;rowTotal+=cnt;var intensity=cnt/maxCnt;var r=Math.round(235-(235-0)*intensity);var g=Math.round(245-(245-60)*intensity);var b=Math.round(248-(248-110)*intensity);return <td key={c.key} style={{background:cnt?"rgb("+r+","+g+","+b+")":"transparent",color:cnt?(intensity>0.5?"#fff":"var(--c-brand-dark)"):"var(--c-text-faint)",fontWeight:cnt?700:400,fontSize:13,textAlign:"center"}}>{cnt||"–"}</td>})}<td style={{fontWeight:700,textAlign:"center",background:"#EDF2F7"}}>{rowTotal}</td></tr>})}</tbody></table></div></div>;
      }
    }()}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:16}}>
      {cfg.shifts.map(function(sh){var cObj=COLORS.find(function(c){return c.id===sh.color});var barColor=cObj?({blue:"#2A4365",green:"#22543D",orange:"#7B341E",purple:"#553C9A",red:"#742A2A",teal:"#234E52"}[cObj.id]||"var(--c-brand)"):"var(--c-brand)";return{label:sh.name+" ("+sh.label+")",key:sh.id,color:barColor,isShift:true}}).concat(cfg.needsBackup?[{label:cfg.backupLabel,key:"backup",color:"#553C9A"}]:[]).concat([{label:"Gesamt",key:"total",color:"var(--c-text)"}]).map(function(card){var maxVal=Math.max.apply(null,cfg.members.map(function(m){var st2=stats[m.id]||{perShift:{},backup:0,total:0};if(card.isShift)return(st2.perShift||{})[card.key]||0;return st2[card.key]||0}).concat([1]));return <div key={card.key} className="card"><div className="card-h"><h4>{card.label}</h4></div><div className="card-b">{cfg.members.map(function(m){var st2=stats[m.id]||{perShift:{},backup:0,total:0};var val=card.isShift?(st2.perShift||{})[card.key]||0:st2[card.key]||0;return <div key={m.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{m.name}</span><span style={{color:card.color,fontWeight:700}}>{val}</span></div><div className="bar-t"><div className="bar-f" style={{width:(val/maxVal*100)+"%",background:card.color}}/></div></div>})}</div></div>})}
    </div>
  </div>}
</div>}

    </div>
