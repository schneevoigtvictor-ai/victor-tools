<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Victor KI Use-Case Studio</title>
<style>
:root{--bg:#f6f8ff;--ink:#0f172a;--muted:#5b647a;--pri:#5b5cf0;--pri2:#00b3ff;--ok:#1f7a38;--warn:#a16207;--bad:#b91c1c;--line:#d7dff6;--card:#ffffffcc}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ink);background:radial-gradient(1100px 650px at 15% -5%,#dbeafe,transparent),radial-gradient(900px 600px at 90% 0,#e9d5ff,transparent),var(--bg)}
.wrap{max-width:1320px;margin:auto;padding:24px}.hero{background:linear-gradient(140deg,#0b1023,#1e1b4b 46%,#0b1023);color:#fff;border-radius:28px;padding:28px;box-shadow:0 18px 44px rgba(20,30,90,.24)}
.hero h1{margin:0;font-size:clamp(1.9rem,4vw,3rem)}.hero p{opacity:.9;max-width:930px}.mode{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.chip{border:1px solid #ffffff40;border-radius:999px;padding:8px 12px;background:#ffffff10;color:#fff;cursor:pointer}.chip.active{background:#fff;color:#0b1023;font-weight:700}
.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}.card{background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:18px;padding:16px}
fieldset{border:none;padding:0;margin:0 0 12px}.sec{font-weight:700;margin:10px 0}.g{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}
label{font-size:.84rem;font-weight:650;display:block;margin:0 0 5px}input,select,textarea{width:100%;padding:10px;border:1px solid #c7d2fe;border-radius:10px;background:#fff}textarea{min-height:86px}
button{padding:10px 12px;border-radius:10px;border:1px solid #c7d2fe;background:#fff;cursor:pointer;font-weight:650}.pri{border:none;background:linear-gradient(100deg,var(--pri),var(--pri2));color:#fff}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,.chip:focus-visible{outline:3px solid #111827;outline-offset:2px}
.actions{display:flex;flex-wrap:wrap;gap:8px}.sticky{position:sticky;top:10px}.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:800;border:1px solid}.ok{background:#dcfce7;color:var(--ok)}.warn{background:#fef3c7;color:var(--warn)}.bad{background:#fee2e2;color:var(--bad)}
#results{display:none;margin-top:16px}.tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{border-radius:999px}.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}.pane{display:none}.pane.active{display:block}
.bar{height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#4f46e5,#06b6d4);transition:.8s}
.toast{position:fixed;right:14px;bottom:14px;background:#0f172a;color:#fff;padding:10px 14px;border-radius:10px;opacity:0;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:none}
.drop{border:2px dashed #93c5fd;border-radius:14px;padding:16px;text-align:center;background:#f8fbff}.small{color:var(--muted);font-size:.86rem}
@media (max-width:1024px){.grid{grid-template-columns:1fr}.g{grid-template-columns:1fr}}
@media print{body>*:not(#printSummary){display:none!important}#printSummary{display:block!important;padding:20px;white-space:pre-wrap}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<h1>KI-Use-Cases bewerten. Schärfer. Schneller. Übergabefähig.</h1>
<p>Ausdata-inspirierte, moderne Studio-Oberfläche: zwei Pfade für Victor – (1) PDF-Template analysieren, (2) Formular nutzen und daraus eine starke Anforderung erzeugen.</p>
<div class="mode" role="tablist" aria-label="Use-Case-Modus">
<button class="chip active" id="modePdf">Use Case A · PDF-Analyse</button>
<button class="chip" id="modeForm">Use Case B · Formular zu Anforderung</button>
</div>
</header>
<div class="grid">
<section class="card" id="left"></section>
<aside class="card sticky" id="side" aria-live="polite"></aside>
</div>
<section class="card" id="results"></section>
<section id="printSummary" style="display:none"></section>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
const state={mode:'pdf',assessment:null};
const formFields=[['title','Titel'],['department','Fachbereich'],['submitter','Einreicher'],['goal','Ziel / Nutzen','textarea'],['description','Kurzbeschreibung','textarea'],['inputData','Input-Daten','textarea'],['sources','Datenquellen','textarea'],['output','Erwarteter Output','textarea'],['outputExample','Output-Beispiel','textarea'],['textGen','Textgenerierung','select',['Ja','Nein','Unklar']],['mlTask','Klassifikation/Prognose/Optimierung','select',['Ja','Nein','Unklar']],['assistant','Chatbot/Assistent','select',['Ja','Nein','Unklar']],['humanCheck','Menschliche Prüfung','select',['Ja','Nein','Unklar']],['qualityDefined','Qualitätskriterien','select',['Ja','Teilweise','Nein','Unklar']],['acceptance','Abnahmekriterien','textarea'],['personalData','Personenbezogene Daten','select',['Ja','Nein','Unklar']],['highRiskDomain','Hochrisikobereich','select',['Ja','Nein','Unklar']],['privacyConcept','Datenschutz-/Löschkonzept','select',['Ja','Teilweise','Nein','Unklar']],['impact','Business Impact','textarea'],['strategicRelevance','Strategische Relevanz','select',['Niedrig','Mittel','Hoch','Unklar']],['victorNotes','Victors Notizen','textarea']];
function leftPanel(){const p=document.getElementById('left');p.innerHTML=state.mode==='pdf'?pdfView():formView();bindLeft();renderSide();}
function pdfView(){return `<h2>Use Case A: PDF hochladen und analysieren</h2><p class='small'>Lokal: PDF-Dateiname & Metadaten werden ausgelesen. Inhaltliche KI-Analyse erfolgt regelbasiert vorbereitend (LLM-ready Architektur).</p><div class='drop'><label for='pdfFile'><strong>PDF-Template hier auswählen</strong></label><input id='pdfFile' type='file' accept='.pdf,application/pdf' aria-label='PDF hochladen'></div><div id='pdfMeta' class='small' style='margin-top:10px'>Noch keine Datei geladen.</div><div class='actions' style='margin-top:10px'><button class='pri' id='analyzePdf'>PDF Use Case bewerten</button><button id='loadExamplePdf'>Beispielinhalt laden</button><button id='resetPdf'>Reset</button></div>`}
function formView(){return `<h2>Use Case B: Formular zu starker Anforderung</h2><form id='f'>${formFields.map(f=>field(f)).join('')}<div class='actions'><button type='button' class='pri' id='evalForm'>Use Case bewerten</button><button type='button' id='ex'>Beispieldaten laden</button><button type='button' id='save'>Zwischenstand speichern</button><button type='button' id='load'>Gespeicherten Stand laden</button><button type='button' id='clear'>Lokale Daten löschen</button></div></form>`}
function field([id,l,t='text',opts=[]]){if(t==='select')return `<div><label for='${id}'>${l}</label><select id='${id}'><option value=''>Bitte wählen</option>${opts.map(o=>`<option>${o}</option>`).join('')}</select></div>`;return `<div class='${t==='textarea'?'full':''}'><label for='${id}'>${l}</label>${t==='textarea'?`<textarea id='${id}'></textarea>`:`<input id='${id}'>`}</div>`}
function collect(){const d={};formFields.forEach(([id])=>d[id]=(document.getElementById(id)?.value||'').trim());return d}
function detectType(d){const txt=JSON.stringify(d).toLowerCase();const llm=/chatbot|llm|gpt|dokument|text|prompt|zusammenfassung/.test(txt)||d.textGen==='Ja'||d.assistant==='Ja';const ml=/prognose|klassifikation|optimierung|forecast|ml|machine learning/.test(txt)||d.mlTask==='Ja';if(llm&&ml)return['Hybrid: LLM + ML','LLM- und ML-Merkmale erkannt.'];if(llm)return['LLM-orientiert','Text-/Dokumenten-/Assistentenlogik erkannt.'];if(ml)return['ML-orientiert','Prognose-/Klassifikationslogik erkannt.'];return['Unklar – nachschärfen','Zu wenige Signale für ML/LLM.']}
function risk(d){let r='🟢 Geringes Risiko',why='Interne Unterstützung ohne starke Risikotreiber.';if(/social scoring|manipulation|biometr|emotionserkennung/.test(JSON.stringify(d).toLowerCase())){r='🔴 Inakzeptables Risiko';why='Mögliche verbotene Praktik.'}else if(d.highRiskDomain==='Ja'||(d.personalData==='Ja'&&d.humanCheck!=='Ja')){r='🟠 Hochrisiko';why='Hochrisikofeld oder Personenbezug mit schwacher Kontrolle.'}else if(d.textGen==='Ja'||d.assistant==='Ja'){r='🟡 Begrenztes Risiko';why='Generative Interaktion erfordert Transparenzmaßnahmen.'}if(d.privacyConcept==='Unklar'&&r==='🟢 Geringes Risiko'){r='🟡 Begrenztes Risiko';why+=' Vorläufig wegen unklarer Datenschutzangaben.'}return {level:r,why}}
function evaluate(d){const miss=['goal','inputData','sources','output','qualityDefined','privacyConcept','impact'].filter(k=>!d[k]||d[k]==='Unklar');const [type,typeWhy]=detectType(d);const r=risk(d);const score=Math.max(0,100-(miss.length*12)-(r.level.startsWith('🟠')?16:0)-(r.level.startsWith('🔴')?40:0));const overall=miss.length>4||r.level.startsWith('🔴')?'Rot':miss.length>=2?'Gelb':'Grün';const cat=score>=75?'MVP-tauglich':score>=60?'POC-tauglich':score>=40?'Frühe Idee':'Nicht bewertungsreif';const qs=[];if(!d.goal)qs.push('Welche konkrete Entscheidung/Tätigkeit unterstützt die KI?');if(!d.sources)qs.push('Welche Datenquellen sind konkret verfügbar?');if(!d.output)qs.push('Wie sieht ein konkretes Output-Beispiel aus?');if(d.humanCheck!=='Ja')qs.push('Wer übernimmt Human-in-the-loop vor Nutzung?');const jira=overall==='Grün'?'Deine Beschreibung ist vollständig und gut verständlich. IT-Analytik prüft das Ticket als nächsten Schritt.':`Danke für deinen Use Case. Bitte beantworte folgende Rückfragen:\n- ${qs.join('\n- ')}`;const summary=`Titel: ${d.title||'—'}\nUse-Case-Typ: ${type}\nReifegrad: ${score}/100\nGesamtampel: ${overall}\nEU-AI-Act: ${r.level}\nKategorie: ${cat}\n\nZiel/Nutzen: ${d.goal||'—'}\nOffene Punkte: ${miss.join(', ')||'keine'}\nNächster Schritt: ${qs[0]||'IT-Handover starten.'}`;return {data:d,type,typeWhy,risk:r,missing:miss,score,overall,category:cat,questions:qs,jira,summary}}
function render(a){state.assessment=a;const el=document.getElementById('results');el.style.display='block';el.innerHTML=`<h2>Bewertungsdashboard</h2><p><span class='badge ${a.overall==='Grün'?'ok':a.overall==='Gelb'?'warn':'bad'}'>${a.overall}</span> <strong>${a.type}</strong> · ${a.typeWhy}</p><div class='bar'><i id='fill'></i></div><p><strong>Score:</strong> ${a.score}/100 · <strong>EU AI Act:</strong> ${a.risk.level} (${a.risk.why})</p><div class='tabs'>${['Überblick','Rückfragen','JIRA-Kommentar','Management Summary','JSON'].map((t,i)=>`<button class='tab ${i===0?'active':''}' data-t='p${i}'>${t}</button>`).join('')}</div><div id='p0' class='pane active'><p><strong>Kategorie:</strong> ${a.category}</p><p><strong>Top-Lücken:</strong> ${a.missing.join(', ')||'keine'}</p></div><div id='p1' class='pane'><ul>${a.questions.map(q=>`<li>${q}</li>`).join('')}</ul></div><div id='p2' class='pane'><pre>${a.jira}</pre><button id='copyJ'>JIRA-Kommentar kopieren</button></div><div id='p3' class='pane'><div class='actions'><button id='genS'>Management Summary generieren</button><button id='copyS'>Management Summary kopieren</button><button id='printS'>Druckansicht Management Summary</button></div><pre id='sum'></pre></div><div id='p4' class='pane'><div class='actions'><button id='export'>Bewertung als JSON exportieren</button><button id='copyJson'>JSON kopieren</button></div><pre id='json'>${JSON.stringify(payload(a),null,2)}</pre></div>`;setTimeout(()=>document.getElementById('fill').style.width=a.score+'%',40);bindResults();el.scrollIntoView({behavior:'smooth'});renderSide();}
function bindResults(){document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.getElementById(t.dataset.t).classList.add('active')});document.getElementById('copyJ').onclick=()=>copy(state.assessment.jira,'JIRA-Kommentar kopiert.');document.getElementById('genS').onclick=()=>{document.getElementById('sum').textContent=state.assessment.summary;toast('Management Summary generiert.')};document.getElementById('copyS').onclick=()=>copy(state.assessment.summary,'Management Summary kopiert.');document.getElementById('printS').onclick=()=>{document.getElementById('printSummary').textContent=state.assessment.summary;window.print()};document.getElementById('export').onclick=exportJson;document.getElementById('copyJson').onclick=()=>copy(document.getElementById('json').textContent,'JSON kopiert.');}
function payload(a){return {timestamp:new Date().toISOString(),mode:state.mode,eingabedaten:a.data,useCaseTyp:a.type,reifegrad:a.score,gesamtampel:a.overall,euAiAct:a.risk,rueckfragen:a.questions,jiraKommentar:a.jira,managementSummary:a.summary,topLuecken:a.missing}}
function exportJson(){const b=new Blob([JSON.stringify(payload(state.assessment),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ki-use-case-bewertung-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);toast('JSON exportiert.');}
async function copy(t,m){try{if(navigator.clipboard)await navigator.clipboard.writeText(t);else{const x=document.createElement('textarea');x.value=t;document.body.appendChild(x);x.select();document.execCommand('copy');x.remove()}toast(m)}catch{toast('Kopieren fehlgeschlagen.')}}
function renderSide(){const s=state.assessment;s?document.getElementById('side').innerHTML=`<h3>Assessment Panel</h3><p><strong>Status:</strong> ${s.overall}</p><p><strong>Nächste beste Aktion:</strong><br>${s.questions[0]||'IT-Übergabe starten.'}</p><p><strong>bereit für IT-Analytik?</strong><br>${s.missing.includes('sources')?'offen':'erfüllt'} · ${s.missing.includes('output')?'offen':'erfüllt'} · ${s.data.humanCheck==='Ja'?'erfüllt':'teilweise'}</p><p><strong>bereit für Steuerkreis KI?</strong><br>${s.data.impact?'erfüllt':'offen'} · ${s.risk.level} · ${s.score>=75?'erfüllt':'teilweise'}</p>`:document.getElementById('side').innerHTML='<h3>Assessment Panel</h3><p>Noch keine Bewertung vorhanden.</p>'}
function bindLeft(){if(state.mode==='pdf'){let pdfData={};document.getElementById('pdfFile').onchange=e=>{const f=e.target.files[0];if(!f)return;pdfData={title:f.name,description:'PDF-Template Upload',goal:'Automatisierte Analyse eines eingereichten Templates',inputData:'PDF-Inhalt',sources:'PDF-Upload',output:'Bewertung mit Rückfragen',textGen:'Ja',assistant:'Ja',qualityDefined:'Teilweise',privacyConcept:'Unklar',impact:'Schnellere Vorprüfung'};document.getElementById('pdfMeta').textContent=`Datei: ${f.name} · ${(f.size/1024).toFixed(1)} KB`;};document.getElementById('analyzePdf').onclick=()=>{if(!pdfData.title)return toast('Bitte erst PDF hochladen.');render(evaluate(pdfData));};document.getElementById('loadExamplePdf').onclick=()=>{pdfData={title:'usecase-template.pdf',description:'Template mit Use-Case-Skizze',goal:'Standardisierte Vorprüfung',inputData:'Template-Felder',sources:'JIRA+PDF',output:'JIRA-Kommentar + Summary',textGen:'Ja',assistant:'Ja',qualityDefined:'Teilweise',privacyConcept:'Unklar',impact:'Weniger Rückfragen'};document.getElementById('pdfMeta').textContent='Beispieldatei simuliert: usecase-template.pdf';toast('Beispielinhalt geladen.');};document.getElementById('resetPdf').onclick=()=>{leftPanel();toast('PDF-Ansicht zurückgesetzt.');};}else{document.getElementById('evalForm').onclick=()=>render(evaluate(collect()));document.getElementById('ex').onclick=()=>{const x={title:'Automatisierte Vorbewertung von KI-Use-Cases',department:'KI-Governance / Business Analyse',submitter:'Victor',description:'Ein KI-Assistent prüft eingereichte Use Cases und erzeugt Rückfragen.',goal:'Standardisierte und schnellere Vorprüfung für IT/FEX/Steuerkreis.',inputData:'Prozesstemplate, JIRA-Ticket',sources:'JIRA, Prozesstemplate',output:'Ampelbewertung, Rückfragen, JIRA-Kommentar',outputExample:'Gesamtampel Gelb mit priorisierten Rückfragen',textGen:'Ja',mlTask:'Nein',assistant:'Ja',humanCheck:'Ja',qualityDefined:'Teilweise',acceptance:'Stichprobenprüfung durch Victor',personalData:'Unklar',highRiskDomain:'Nein',privacyConcept:'Unklar',impact:'Weniger Rückfragen und schnellere Freigabe',strategicRelevance:'Mittel'};Object.entries(x).forEach(([k,v])=>{const el=document.getElementById(k);if(el)el.value=v});toast('Beispieldaten geladen.');};document.getElementById('save').onclick=()=>{localStorage.setItem('victorDraft',JSON.stringify(collect()));toast('Zwischenstand gespeichert.');};document.getElementById('load').onclick=()=>{const r=localStorage.getItem('victorDraft');if(!r)return toast('Kein gespeicherter Stand.');Object.entries(JSON.parse(r)).forEach(([k,v])=>{const el=document.getElementById(k);if(el)el.value=v});toast('Gespeicherter Stand geladen.');};document.getElementById('clear').onclick=()=>{localStorage.removeItem('victorDraft');toast('Lokale Daten gelöscht.');};}}
function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1700)}
document.getElementById('modePdf').onclick=()=>{state.mode='pdf';document.getElementById('modePdf').classList.add('active');document.getElementById('modeForm').classList.remove('active');leftPanel()};
document.getElementById('modeForm').onclick=()=>{state.mode='form';document.getElementById('modeForm').classList.add('active');document.getElementById('modePdf').classList.remove('active');leftPanel()};
leftPanel();
</script>
</body>
</html>
